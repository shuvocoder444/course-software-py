<!-- ভিউ থেকে পাঠানো layout_path (layout_vertical.html) কে extend করা হচ্ছে -->
{% extends layout_path %}

{% load static %}

{% block title %}Create Course - Vuexy{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">

  <!-- Django মেসেজ অ্যালার্ট শো করার অংশ (সফল হলে পপ-আপ আসবে) -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}

  <!-- কোর্স হেডার -->
  <h4 class="py-3 mb-4">
    <span class="text-muted fw-light">Courses /</span> {{ course_name }}
  </h4>

  <!-- Vuexy ফর্ম কার্ড ডিজাইন -->
  <div class="row">
    <div class="col-md-12">
      <div class="card mb-4">
        <h5 class="card-header">Course Information Form</h5>
        <div class="card-body">
          <form method="POST" action="">
            {% csrf_token %}

            <!-- যদি জেনুইন ফর্ম ক্লাস থাকে তবে এখানে {{ form.as_p }} বা কাস্টম ফিল্ড দিতে পারেন -->
            <div class="mb-3">
              <label class="form-label" for="courseTitle">Course Title</label>
              <input type="text" class="form-line form-control" id="courseTitle" placeholder="e.g. Laravel Core PHP Masterclass" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="courseCategory">Category</label>
              <select class="form-select" id="courseCategory">
                <option value="development">Web Development</option>
                <option value="design">UI/UX Design</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">Submit Application</button>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
